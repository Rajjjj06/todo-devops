name: CI-CD Pipeline

permissions:
  contents: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setting up Node js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install and Test Backend
        working-directory: ./backend
        run: |
          npm install
          npm test --if-present

      - name: Install and Test Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm test --if-present
          npm run build

  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Scan for hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan backend dependencies
        working-directory: ./backend
        run: npm audit --audit-level=high || true

      - name: Scan frontend dependencies
        working-directory: ./frontend
        run: npm audit --audit-level=high || true

  build:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - uses: actions/checkout@v3

      # ───────── AWS LOGIN ─────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # ───────── BUILD BACKEND ─────────
      - name: Build backend image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/todo-backend:$TAG ./backend
          docker build -t $REGISTRY/todo-backend:latest ./backend

      - name: Push backend image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker push $REGISTRY/todo-backend:$TAG
          docker push $REGISTRY/todo-backend:latest

      # ───────── BUILD FRONTEND ─────────
      - name: Build frontend image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
        run: |
          docker build \
            --build-arg VITE_BACKEND_URL=$VITE_BACKEND_URL \
            -t $REGISTRY/todo-frontend:$TAG ./frontend

          docker build \
            --build-arg VITE_BACKEND_URL=$VITE_BACKEND_URL \
            -t $REGISTRY/todo-frontend:latest ./frontend

      - name: Push frontend image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          docker push $REGISTRY/todo-frontend:$TAG
          docker push $REGISTRY/todo-frontend:latest

      # ───────── UPDATE K8s MANIFESTS ─────────
      - name: Update image tags
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          sed -i "s|todo-backend:.*|todo-backend:$TAG|" k8s/backend-deployment.yaml
          sed -i "s|todo-frontend:.*|todo-frontend:$TAG|" k8s/frontend-deployment.yaml

          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"

          git add k8s/backend-deployment.yaml k8s/frontend-deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to $TAG"
          git push

      # ───────── KUBECTL SETUP ─────────
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Write kubeconfig
        run: echo "$KUBECONFIG" > kubeconfig.yaml
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}

      # ───────── INSTALL CERT-MANAGER ─────────
      - name: Install cert-manager
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig.yaml
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml

          echo "Waiting for cert-manager..."
          kubectl wait --for=condition=available deployment/cert-manager -n cert-manager --timeout=180s
          kubectl wait --for=condition=available deployment/cert-manager-webhook -n cert-manager --timeout=180s

      # ───────── INSTALL AWS LOAD BALANCER CONTROLLER ─────────
      - name: Install AWS Load Balancer Controller
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig.yaml
        run: |
          kubectl apply -k "github.com/aws/eks-charts/stable/aws-load-balancer-controller/crds?ref=master"
          kubectl apply -k "github.com/aws/eks-charts/stable/aws-load-balancer-controller?ref=master"

          echo "Waiting for AWS Load Balancer Controller..."
          kubectl wait --for=condition=available deployment/aws-load-balancer-controller -n kube-system --timeout=300s

      # ───────── DEPLOY IN CORRECT ORDER ─────────
      - name: Deploy to Kubernetes
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig.yaml
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/frontend-deployment.yaml

          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/frontend-service.yaml

          kubectl apply -f k8s/cluster-issuer.yaml
          kubectl apply -f k8s/ingress.yaml
